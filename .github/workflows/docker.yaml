name: Deploy Umami on AWS

on:
    workflow_dispatch:
permissions:
    id-token: write
    contents: read
    #push:
        #branches: [main]
        #paths:
            #- dockerfile
            #- umami/**



env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: umami
  ECS_CLUSTER: umami-cluster
  ECS_SERVICE: umami-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::565895652873:role/github_OIDC"
          aws-region: us-east-1

      - name: Login to Amazon ECR 
        id: login-ecr 
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t umami:${{ github.sha }} -f dockerfile .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'umami:${{ github.sha }}'
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true 
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Tag image
        env:
         ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
         ECR_REPOSITORY: umami
         IMAGE_TAG: ${{ github.sha }}

        run: |
          docker tag umami:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push image to ECR
        env:
         ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
         ECR_REPOSITORY: umami
         IMAGE_TAG: ${{ github.sha }} 

        run: | 
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      
      - name: Download active task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition umami-task \
            --query taskDefinition > task-definition.json

      
      - name: Fill in the new image ID in the Amazon ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: umami
          image: ${{ steps.login-ecr.outputs.registry }}/umami:${{ github.sha }}

    
