name: Terraform CICD
on:
    workflow_dispatch:
  #push:
   # branches:
    #  - master
    #paths:
    #  - terraform/**
permissions:
  id-token: write
  contents: read
jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::565895652873:role/Terraform_workflow"
          aws-region: us-east-1
      - name: Run Checkov security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: cli
          soft_fail: true   
      - name: Terraform init
        working-directory: ./terraform/workflows/development/backend-infra
        run: terraform init
      - name: Terraform plan
        working-directory: ./terraform/workflows/development/backend-infra
        run: terraform plan -out=tfplan
      - name: Terraform Apply
        working-directory: ./terraform/workflows/development/backend-infra  
        run: terraform apply -auto-approve tfplan 

        #probably would have more jobs or workflows for different workflows